<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web2Bridge SDK Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0b0f;
      --bg-card: #12141c;
      --bg-input: #0d0f16;
      --border: #1e2133;
      --border-focus: #6c5ce7;
      --text: #e4e6ef;
      --text-muted: #7a7f98;
      --text-dim: #4a4f68;
      --primary: #6c5ce7;
      --primary-light: #8b7cf7;
      --accent: #00cec9;
      --success: #00b894;
      --success-bg: rgba(0, 184, 148, 0.1);
      --danger: #ff6b6b;
      --danger-bg: rgba(255, 107, 107, 0.1);
      --warning: #fdcb6e;
      --radius: 10px;
      --font: "Inter", -apple-system, sans-serif;
      --mono: "JetBrains Mono", monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    #root { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }

    /* Nav */
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .nav-brand { font-weight: 700; font-size: 1.05rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .nav-brand span { color: var(--primary-light); }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* Cards */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
    .card-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 20px; }

    /* Section divider */
    .section-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 12px; padding-left: 2px; }

    /* Inputs */
    label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
    input, textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--border-focus); }
    textarea { resize: vertical; font-family: var(--mono); font-size: 0.78rem; line-height: 1.6; }

    /* Buttons */
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    button:hover:not(:disabled) { border-color: var(--primary); background: rgba(108,92,231,0.08); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-light); border-color: var(--primary-light); }
    .btn-sm { width: auto; padding: 6px 14px; font-size: 0.78rem; }
    .btn-danger { border-color: rgba(255,107,107,0.3); color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: var(--danger-bg); border-color: var(--danger); }
    .btn-copy { width: auto; padding: 5px 12px; font-size: 0.72rem; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .badge-prf { background: rgba(0,206,201,0.12); color: var(--accent); border: 1px solid rgba(0,206,201,0.2); }
    .badge-password { background: rgba(108,92,231,0.12); color: var(--primary-light); border: 1px solid rgba(108,92,231,0.2); }
    .badge-network { background: rgba(253,203,110,0.1); color: var(--warning); border: 1px solid rgba(253,203,110,0.2); }

    /* Verification result */
    .result-box { padding: 16px; border-radius: 8px; margin-top: 16px; }
    .result-valid { background: var(--success-bg); border: 1px solid rgba(0,184,148,0.25); }
    .result-invalid { background: var(--danger-bg); border: 1px solid rgba(255,107,107,0.25); }
    .result-icon { font-size: 1.4rem; margin-right: 8px; }
    .result-title { font-weight: 700; font-size: 0.95rem; }
    .result-detail { margin-top: 4px; }
    .result-detail label { margin-bottom: 4px; }
    .result-detail .mono-box { font-family: var(--mono); font-size: 0.75rem; word-break: break-all; background: rgba(0,0,0,0.25); padding: 8px 12px; border-radius: 6px; margin-bottom: 4px; }
    .verify-field { margin-bottom: 10px; }
    .verify-field:last-child { margin-bottom: 0; }

    /* Mono display */
    .mono-box { font-family: var(--mono); font-size: 0.78rem; word-break: break-all; background: var(--bg-input); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); }

    /* CBOR output */
    .cbor-box { font-family: var(--mono); font-size: 0.72rem; word-break: break-all; background: var(--bg-input); padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); max-height: 160px; overflow-y: auto; line-height: 1.6; margin-bottom: 12px; }

    /* Wallet identity section */
    .identity-section { margin-top: 8px; }
    .identity-row { margin-bottom: 14px; }
    .identity-row:last-child { margin-bottom: 0; }
    .identity-label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
    .identity-icon { font-size: 0.9rem; }
    .identity-hint { font-weight: 400; font-size: 0.72rem; color: var(--text-dim); }
    .identity-value { font-size: 0.7rem; word-break: break-all; line-height: 1.5; }
    .identity-meta { font-size: 0.82rem; color: var(--text); padding: 4px 0; }
    .loading-text { color: var(--text-dim); font-style: italic; }
    .badge-mainnet { background: rgba(0,184,148,0.12); color: var(--success); border: 1px solid rgba(0,184,148,0.2); }

    /* Wallet info strip (legacy) */
    .wallet-strip { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
    .wallet-strip .mono-box { flex: 1; min-width: 200px; font-size: 0.72rem; padding: 8px 12px; }

    /* Sign-in area */
    .signin-area { text-align: center; padding: 40px 20px; }
    .signin-area h2 { font-size: 1.3rem; margin-bottom: 8px; }
    .signin-area p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; }
    .signin-area .steps { text-align: left; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .signin-area .steps li { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 6px; padding-left: 4px; }

    /* Password field inline */
    .password-section { margin-top: 16px; text-align: left; }
    .password-section small { display: block; margin-top: 6px; font-size: 0.75rem; color: var(--text-dim); }

    /* Spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert */
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 16px; }
    .alert-error { background: var(--danger-bg); border: 1px solid rgba(255,107,107,0.2); color: var(--danger); }
    .alert-info { background: rgba(108,92,231,0.08); border: 1px solid rgba(108,92,231,0.15); color: var(--primary-light); }

    /* Steps detecting state */
    .steps-detecting { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.82rem; }

    /* Arrow connector */
    .flow-connector { text-align: center; padding: 8px 0; color: var(--text-dim); font-size: 1.2rem; }

    /* Footer */
    .footer { text-align: center; padding: 24px 0; font-size: 0.75rem; color: var(--text-dim); border-top: 1px solid var(--border); margin-top: 40px; }
    .footer a { color: var(--primary-light); text-decoration: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
